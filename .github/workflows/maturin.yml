name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        arch: [x86, x86_64]
        os:
          [ubuntu-latest]
          # - runner: ubuntu-24.04
          #   target: aarch64
          # - runner: ubuntu-24.04
          #   target: armv7
          # - runner: ubuntu-24.04
          #   target: s390x
          # - runner: ubuntu-24.04
          #   target: ppc64le
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.arch }}
          args: --release --out dist --zig
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.arch }}
          args: --release --out dist --zig -i python3.13t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}
          path: dist
      - name: pytest
        if: ${{ startsWith(matrix.arch, 'x86_64') }}
        shell: bash
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
          pip install sgrpy[rdkit,lint,test] --find-links dist --force-reinstall
          pip install pytest
          ruff check
          ruff format --check
          mypy . --no-install-types
          pytest --pyargs sgrpy
      - name: pytest
        if: ${{ !startsWith(matrix.arch, 'x86') && matrix.arch != 'ppc64' }}
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: ${{ matrix.arch }}
          distro: ubuntu24.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            apt-get install -y --no-install-recommends python312 python3-pip
            pip3 install -U pip pytest
          run: |
            set -e
            pip3 install sgrpy --find-links dist --force-reinstall
            ruff check
            ruff format --check
            mypy . --no-install-types
            pytest --pyargs sgrpy

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
          # - runner: windows-latest
          #   target: x86
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.13t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        if: ${{ !startsWith(matrix.platform.target, 'aarch64') }}
        shell: bash
        run: |
          set -e
          python3 -m venv .venv
          source .venv/Scripts/activate
          pip install sgrpy[rdkit,lint,test] --find-links dist --force-reinstall
          pip install pytest
          ruff check
          ruff format --check --config 'format.line-ending = "auto"'
          # mypy . --no-install-types
          pytest --pyargs sgrpy

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.13t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
          pip install sgrpy[rdkit,lint,test] --find-links dist --force-reinstall
          pip install pytest
          ruff check
          ruff format --check
          mypy . --no-install-types
          pytest --pyargs sgrpy

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs: [linux, windows, macos, sdist]
    # permissions:
    #   # Use to sign the release artifacts
    #   id-token: write
    #   # Used to upload release artifacts
    #   contents: write
    #   # Used to generate artifact attestation
    #   attestations: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
      - name: Add wheels
        uses: softprops/action-gh-release@v2
        with:
          files: wheels-*/*
